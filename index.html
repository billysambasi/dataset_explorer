<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dataset Explorer</title>
  </head>
  <body>
    <h1>Dataset Explorer</h1>
    <input type="file" id="fileInput" accept=".csv" />
    <table id="statsTable">
      <thead>
        <tr>
          <th>Column</th>
          <th>Mean</th>
          <th>Median</th>
          <th>Variance</th>
          <th>Min</th>
          <th>Max</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <canvas id="chart"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
